name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: "file:./prisma/dev.db"

      - name: Patch for static export
        run: node scripts/patch-for-static.mjs

      - name: Build
        run: npm run build
        env:
          STATIC_EXPORT: "true"
          DATABASE_URL: "file:./prisma/dev.db"
          ADMIN_PASSWORD: "build"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
